apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "laravel-app.fullname" . }}-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "laravel-app.labels" . | nindent 4 }}
data:
  APP_ENV: {{ .Values.env.APP_ENV | quote }}
  APP_DEBUG: {{ .Values.env.APP_DEBUG | quote }}
  LOG_CHANNEL: {{ .Values.env.LOG_CHANNEL | quote }}
  CACHE_DRIVER: "file"
  SESSION_DRIVER: "file"
  QUEUE_CONNECTION: "sync"
  REDIS_HOST: {{ include "laravel-app.fullname" . }}-redis
  REDIS_PORT: {{ .Values.env.REDIS_PORT | quote }}
  REDIS_DB: {{ .Values.env.REDIS_DB | quote }}