replicaCount: 2

image:
  repository: hmsmiraz/softbd-task
  tag: "v1.0.0"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: dockerhub-secret

nameOverride: ""
fullnameOverride: ""

namespace: laravel

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  host: laravel-test.local
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

pvc:
  enabled: true
  storageSize: 1Gi
  storageClass: ""

env:
  APP_ENV: production
  APP_DEBUG: "false"
  LOG_CHANNEL: stderr
  CACHE_DRIVER: file
  SESSION_DRIVER: file
  QUEUE_CONNECTION: sync

secret:
  appKey: ""

livenessProbe:
  path: /health
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  readOnlyRootFilesystem: false

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true

queueWorker:
  enabled: true
  replicaCount: 1

scheduler:
  enabled: true

nodeSelector: {}
tolerations: []
affinity: {}